name: workflow test
on:
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
jobs:
  test_model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - name : run extra file
        run: |
          python cool.py | tee file.txt
      - name: Save output file
        uses: actions/upload-artifact@v4
        with:
          name: script-output
          path: file.txt
